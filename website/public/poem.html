<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <link href='https://fonts.googleapis.com/css?family=Lato:100' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Lato:100italic' rel='stylesheet' type='text/css'>
    <title>Radiant Abyss</title>
<style>
body {
    margin: 0;
    padding: 0;
}
.fullscreen {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
}
.fullscreen canvas {
    object-fit: contain;
    width: 100%;
    height: 100%;
    aspect-ratio: 16 / 9;
    background-color: #000;
}
.centered {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
@keyframes fadein {
    from { opacity: 0; }
    to { opacity: 1; }
}
@keyframes fadeout {
    from { opacity: 1; }
    to { opacity: 0; }
}
.fadein-text {
    animation: fadein 1.0s forwards;
}
.fadeout-text {
    animation: fadeout 1.0s forwards;
}

</style>
</head>
<body>
    <div class="fullscreen">
        <canvas id="canvas" width="1280" height="720"></canvas>
        <div id="main" class="centered">
        </div>
    </div>
    <script type="module" src="poem.js"></script>
</body>
</html>
