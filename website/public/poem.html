<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <link href='https://fonts.googleapis.com/css?family=Lato:100' rel='stylesheet' type='text/css'>
    <title>Radiant Abyss</title>
<style>
body {
    margin: 0;
    padding: 0;
}
.fullscreen {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
}
.fullscreen canvas {
    object-fit: contain;
    width: 100%;
    height: 100%;
    aspect-ratio: 16 / 9;
    background-color: #000;
}
button {
    position: relative;
    display: flex;
    background-color: #000088;
    color: #fff;
    padding: 20px 50px 20px 50px;
    border-radius: 50px;
    margin: auto;
    width: fit-content;
}
button:hover {
    background-color: #44f;
}
</style>
</head>
<body>
    <audio id="bgmusic" src="cliffs.opus"></audio>
    <div class="fullscreen">
        <button id="play">Play</button>
    </div>
    <script type="module" src="poem.js"></script>
</body>
</html>
